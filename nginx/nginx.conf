# /nginx/nginx.conf

user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Settings for the Next.js application
    server {
        listen 80;
        server_name localhost;

        # ** THE DEFINITIVE FIX **
        # 1. Allow larger file uploads (e.g., 50MB)
        client_max_body_size 300m;

        # 2. Increase timeouts to prevent gateway errors on long-running imports
        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
        send_timeout          300s;

        location / {
            proxy_pass http://app:3000; # Assumes your Next.js app container is named 'app'
            proxy_http_version 1.1;
            # No WebSockets in prod -- strip any client-provided Upgrade/
            # Connection to block H2C smuggling (Semgrep
            # possible-nginx-h2c-smuggling). If WebSocket support is ever
            # needed, set these via a `map` that only passes through
            # Upgrade: websocket.
            proxy_set_header Upgrade "";
            proxy_set_header Connection "close";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}