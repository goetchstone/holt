# osv-scanner.toml
#
# Suppressions for known-false-positives. Each entry documents why the
# CVE does not apply to this install. Reviewed weekly; any suppression
# with an ignoreUntil date past today should be re-evaluated.

# xlsx CVEs below are scanner false positives: osv-scanner matches by
# name+version ("xlsx@0.20.3"), but package.json installs xlsx directly
# from SheetJS's patched CDN tarball
#   https://cdn.sheetjs.com/xlsx-0.20.3/xlsx-0.20.3.tgz
# The CDN tarball shares the 0.20.3 version string but contains the
# upstream patches that the npm registry copy lacks (SheetJS pulled
# from npm in 2023; post-2023 patches are CDN-only). Verified by
# diffing the CDN tarball contents against the npm artifact that osv
# cites. Revisit on SheetJS version bump or if we migrate off xlsx.

[[IgnoredVulns]]
id = "GHSA-4r6h-8v6p-xvw6"
ignoreUntil = 2026-07-24
reason = "Prototype pollution in SheetJS xlsx. We install from SheetJS CDN tarball which has the patch despite sharing the 0.20.3 version string. See package.json line for xlsx."

[[IgnoredVulns]]
id = "GHSA-5pgg-2g8v-p4x9"
ignoreUntil = 2026-07-24
reason = "ReDoS in SheetJS xlsx. Same mitigation as GHSA-4r6h-8v6p-xvw6 — installed from SheetJS patched CDN tarball."
