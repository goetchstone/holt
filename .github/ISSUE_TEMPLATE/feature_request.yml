name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the system does this relate to?
      options:
        - Sales / POS
        - Quotes / Orders
        - Inventory / Warehouse
        - Purchasing / POs
        - Service Cases
        - Service Dispatch
        - House Calls
        - Returns
        - Reports / Dashboard
        - Pricing / Import
        - Products / Catalog
        - Customers
        - Admin / Setup
        - Printing (receipts, labels)
        - Delivery / Dispatch
        - New Area
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this?
      options:
        - Nice to have
        - Should have (before launch)
        - Must have (blocking)
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What do you need?
      description: Describe the feature or improvement you want
      placeholder: |
        As a [designer/manager/warehouse], I need to ...
        so that I can ...
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: How do you do this today? Screenshots of current workflow?
    validations:
      required: false
